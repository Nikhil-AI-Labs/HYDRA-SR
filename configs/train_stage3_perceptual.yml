name: hydra_sr_stage3_perceptual
description: "Stage 3 — Perceptual Training. 120K iterations, dynamic TSD+LPIPS distillation."

model:
  scale: 4
  dim_p: 192
  dim_w: 160
  n_mamba_p: 14
  n_mamba_w: 9
  n_nafblocks_s1: 4
  n_transformer: 2
  prompt_dim: 128
  J: 2
  wave: db4
  use_checkpoint: true
  upsampler_mid_dim: 64

  resume_from: ./checkpoints/stage2/best_ema.pth

train:
  dataset:
    hr_root: ./data/train_HR
    lr_root:  null              # LR generated on-the-fly (real degradation)
    patch_size: 96
    scale: 4
    batch_size: 24    # increased to 24 to utilize H100 (kept slightly under 32 for TSD overhead)
    num_workers: 8
    use_real_degradation: true
    real_deg_weight: 1.0

  total_iter: 120000

  # Progressive Patch Curriculum (LR patch size)
  patch_curriculum:
    - {iter: 0,       patch_size: 96}    # Steps 0 – 39K
    - {iter: 40000,   patch_size: 128}   # Steps 40K – 79K
    - {iter: 80000,   patch_size: 160}   # Steps 80K – 120K

  optimizer:
    type: AdamW
    lr: 2.0e-5
    betas: [0.9, 0.99]
    weight_decay: 1.0e-4
    mamba_weight_decay: 1.0e-5

  scheduler:
    type: CosineAnnealing
    eta_min: 1.0e-8
    warmup_iter: 1000

  loss:
    # Initial weights — DynamicWeighter adjusts λ_l1 and λ_tsd during training
    l1_weight:     0.1
    lpips_weight:  1.0
    tsd_weight:    0.6
    dtw_weight:    0.4
    gan_weight:    0.1

    # Dynamic weighter config
    dynamic_weighter:
      patience: 10000
      delta_thr: 0.001
      tsd_max: 2.0

  # EMA-DiffWarmup: first 10K iters of Stage 3, use EMA-smoothed weights
  # for teacher predictions to prevent distillation mode collapse
  ema_diffwarmup_iters: 10000

  ema:
    decay: 0.999
    update_every: 1

  grad_clip:
    max_norm: 1.0

  amp:
    enabled: true
    dtype: bfloat16

val:
  dataset:
    hr_root: ./data/val_HR
    lr_root: ./data/val_LR     # pre-computed val LR for consistent PSNR benchmarking
    scale: 4
  every: 5000
  metrics: [psnr_y, ssim_y, lpips]
  target_lpips: 0.135   # acceptance criterion for Week 7

logging:
  save_every: 5000
  log_every: 50
  use_wandb: true
  wandb_project: hydra-sr
  checkpoint_dir: ./checkpoints/stage3
